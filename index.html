<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DebateHub</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
        }

        /* Navbar */
        .navbar {
            background: rgba(0,0,0,0.85) !important;
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 50px 20px;
        }

        .hero h1 {
            font-weight: 600;
            font-size: 2.5rem;
        }

        .hero p {
            color: #555;
        }

        /* Cards */
        .card {
            border: none;
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.1);
        }

        .card-title {
            font-weight: 600;
        }

        /* Buttons */
        .btn {
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* Create Debate Card */
        .create-card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
        }

        /* Section Title */
        .section-title {
            font-weight: 600;
            text-align: center;
            margin-bottom: 25px;
        }/* Fade In */
        .fade-in {
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Slide from Left */
        .slide-left {
            animation: slideLeft 0.6s ease forwards;
        }

        @keyframes slideLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Slide from Right */
        .slide-right {
            animation: slideRight 0.6s ease forwards;
        }

        @keyframes slideRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Button pulse */
        .btn-pulse:hover {
            animation: pulse 0.4s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="#">🔥 DebateHub</a>

        <div>
            <a href="login.html" class="btn btn-outline-light" id="loginBtn">Login</a>
            <button class="btn btn-danger d-none" id="logoutBtn" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<!-- Hero -->
<div class="hero">
    <h1>Speak. Debate. Win.</h1>
    <p>Join conversations that matter and share your perspective.</p>
</div>

<div class="container">

    <!-- Create Debate -->
    <div class="card create-card shadow-sm mb-5 d-none" id="createDebateSection">
        <div class="card-body">
            <h4 class="mb-3">Start a New Debate</h4>

            <form id="createDebateForm">
                <div class="mb-3">
                    <input type="text" id="debateTitle" class="form-control" placeholder="Debate Title..." required>
                </div>

                <div class="mb-3">
                    <textarea id="debateDesc" class="form-control" rows="2" placeholder="Description..." required></textarea>
                </div>

                <button class="btn btn-dark">Create Debate</button>
            </form>

            <div id="createMsg" class="mt-2 text-danger"></div>
        </div>
    </div>

    <!-- Debates -->
    <h3 class="section-title">🔥 Trending Debates</h3>

    <div id="debatesList" class="row"></div>
</div>

<script>
    const token = localStorage.getItem('token');

    // Auth UI
    if (token) {
        document.getElementById('loginBtn').classList.add('d-none');
        document.getElementById('logoutBtn').classList.remove('d-none');
        document.getElementById('createDebateSection').classList.remove('d-none');
    }

    function logout() {
        localStorage.removeItem('token');
        window.location.reload();
    }

    // Load debates
    function loadDebates() {
        fetch('https://blog-backend-8efx.onrender.com/debates')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('debatesList');
                list.innerHTML = '';

                data.debates.forEach(debate => {
                    const col = document.createElement('div');
                    col.className = 'col-md-6 col-lg-4 mb-4';

                    const author = debate.creator ? debate.creator.username : 'Unknown';

                    col.innerHTML = `
                        <div class="card h-100 p-3">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">${debate.title}</h5>

                                <h6 class="text-muted mb-2">👤 ${author}</h6>

                                <p class="card-text text-secondary flex-grow-1">
                                    ${debate.description}
                                </p>

                                <a href="debate.html?id=${debate._id}" 
                                   class="btn btn-dark btn-sm mt-3">
                                   Join Debate →
                                </a>
                            </div>
                        </div>
                    `;

                    list.appendChild(col);
                });
            })
            .catch(err => console.error(err));
    }

    // Create debate
    if (token) {
        document.getElementById('createDebateForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const title = document.getElementById('debateTitle').value;
            const description = document.getElementById('debateDesc').value;

            fetch('https://blog-backend-8efx.onrender.com/debates', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ title, description })
            })
            .then(res => res.json().then(data => {
                if (!res.ok) throw new Error(data.message);
                return data;
            }))
            .then(() => {
                document.getElementById('createDebateForm').reset();
                loadDebates();
            })
            .catch(err => {
                document.getElementById('createMsg').innerText = err.message;
            });
        });
    }

    loadDebates();
</script>

</body>
</html>
