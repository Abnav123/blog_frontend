<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DebateHub</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
        }

        .card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            animation: fadeUp 0.7s ease;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-5">🔥 DebateHub</h1>

    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg p-4">

                <h3 class="text-center mb-4">Create Account ✨</h3>

                <form id="registerForm">
                    <input type="text" id="regUsername" class="form-control mb-3" placeholder="Username" required>
                    <input type="email" id="regEmail" class="form-control mb-3" placeholder="Email" required>
                    <input type="password" id="regPassword" class="form-control mb-3" placeholder="Password" required>

                    <button class="btn btn-outline-dark w-100">Register</button>
                </form>

                <p class="text-center mt-3">
                    Already have an account? 
                    <a href="login.html">Login</a>
                </p>

                <div id="regMsg" class="text-center mt-2"></div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const username = regUsername.value;
    const email = regEmail.value;
    const password = regPassword.value;

    fetch('https://blog-backend-8efx.onrender.com/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
    })
    .then(res => res.json().then(data => {
        if (!res.ok) throw new Error(data.message);
        return data;
    }))
    .then(() => {
        regMsg.className = "text-success text-center mt-2";
        regMsg.innerText = "Registered! Redirecting to login...";
        setTimeout(() => window.location.href = 'login.html', 1500);
    })
    .catch(err => {
        regMsg.className = "text-danger text-center mt-2";
        regMsg.innerText = err.message;
    });
});
</script>

</body>
</html>
